apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-feedback-api
  labels:
    app: atlas-feedback-api
    dxp.io/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-feedback-api
  template:
    metadata:
      labels:
        app: atlas-feedback-api
        backstage.io/kubernetes-id: atlas-feedback-api
    spec:
      nodeSelector:
        role: workload
      tolerations:
      - key: role
        operator: Equal
        value: workload
        effect: NoSchedule
      containers:
      - name: atlas-feedback-api
        image: harbor.harbor.svc.cluster.local/dxp/atlas-feedback-api:bb87bfd
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-feedback-api
spec:
  selector:
    app: atlas-feedback-api
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-feedback-api
  labels:
    app: atlas-feedback-api
    dxp.io/managed: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: atlas-feedback-api.68.221.5.247.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlas-feedback-api
            port:
              number: 80